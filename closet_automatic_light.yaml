blueprint:
  name: Closet Automatic Light
  description: >
    Automatically turns a light on (at a specified brightness) when a contact
    sensor is opened, and turns it off when the sensor is closed.
  domain: automation
  input:
    contact_sensor:
      name: Contact Sensor
      description: The door/contact sensor that triggers the light.
      selector:
        entity:
          domain: binary_sensor
          device_class: door
    light_entity:
      name: Light
      description: The light to control.
      selector:
        entity:
          domain: light
    brightness:
      name: Brightness
      description: Brightness level when the light turns on (1–100%).
      default: 100
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
          mode: slider

trigger:
  - platform: state
    entity_id: !input contact_sensor
    to: "on"
    id: door_opened
  - platform: state
    entity_id: !input contact_sensor
    to: "off"
    id: door_closed

action:
  - choose:
      - conditions:
          - condition: trigger
            id: door_opened
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              brightness_pct: !input brightness
      - conditions:
          - condition: trigger
            id: door_closed
        sequence:
          - service: light.turn_off
            target:
              entity_id: !input light_entity

mode: restart
